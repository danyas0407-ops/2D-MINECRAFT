<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Блокируем зум и скролл экрана на телефоне, чтобы игра не дергалась -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrowserCraft</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #87CEEB; 
            touch-action: none; /* Отключаем стандартные жесты браузера */
        }
        canvas { display: block; }
        /* Зона для джойстика (левая половина экрана) */
        #joystick-zone {
            position: absolute; 
            left: 0; 
            bottom: 0; 
            width: 50%; 
            height: 100%; 
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="joystick-zone"></div>

    <!-- Подключаем 3D-движок Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Подключаем библиотеку Nipple.js для джойстика -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script>
        // === 1. НАСТРОЙКА СЦЕНЫ И КАМЕРЫ ===
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Синее небо
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50); // Легкий туман вдалеке

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // Создаем "тело" игрока, чтобы вращать его целиком
        const player = new THREE.Group();
        player.position.set(0, 2, 0); // Поднимаем камеру на уровень глаз
        player.add(camera);
        scene.add(player);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Добавляем освещение (солнце)
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040)); // Мягкий базовый свет

        // === 2. ГЕНЕРАЦИЯ МИРА ===
        // Создаем зеленую землю
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x55aa55 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2; // Кладем плоскость на пол
        scene.add(ground);

        // Раскидываем 30 случайных блоков для ориентира
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const boxMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 }); // Цвет дерева/земли
        for(let i = 0; i < 30; i++) {
            const box = new THREE.Mesh(boxGeo, boxMat);
            // Случайные координаты по осям X и Z
            box.position.set((Math.random() - 0.5) * 40, 0.5, (Math.random() - 0.5) * 40);
            scene.add(box);
        }

        // === 3. УПРАВЛЕНИЕ: ДЖОЙСТИК (ХОДЬБА) ===
        let moveForward = 0;
        let moveRight = 0;
        const speed = 0.15; // Скорость ходьбы

        // Создаем виртуальный джойстик в левой части экрана
        const joystick = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'dynamic',
            color: 'white'
        });

        joystick.on('move', (evt, data) => {
            const angle = data.angle.radian;
            const force = Math.min(data.force, 1); // Чем сильнее тянешь, тем быстрее шаг
            
            // Вычисляем направление (ниппель считает 0 радиан вправо)
            moveForward = Math.sin(angle) * force;
            moveRight = Math.cos(angle) * force;
        });

        joystick.on('end', () => {
            // Остановка, когда отпускаем палец
            moveForward = 0;
            moveRight = 0;
        });

        // === 4. УПРАВЛЕНИЕ: ВРАЩЕНИЕ КАМЕРОЙ (ПРАВАЯ ЧАСТЬ ЭКРАНА) ===
        let isDragging = false;
        let previousTouch = { x: 0, y: 0 };
        let rotationY = 0; // Поворот тела влево/вправо
        let rotationX = 0; // Наклон головы вверх/вниз

        document.addEventListener('touchstart', (e) => {
            // Игнорируем левую половину (там работает джойстик)
            if (e.touches[0].clientX < window.innerWidth / 2) return; 
            isDragging = true;
            previousTouch.x = e.touches[0].clientX;
            previousTouch.y = e.touches[0].clientY;
        }, {passive: false});

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            
            // Ищем палец, который находится на правой половине экрана
            let touch = Array.from(e.touches).find(t => t.clientX > window.innerWidth / 2);
            if (!touch) return;

            const deltaX = touch.clientX - previousTouch.x;
            const deltaY = touch.clientY - previousTouch.y;

            // Чувствительность камеры (измени, если слишком резко/медленно)
            rotationY -= deltaX * 0.005;
            rotationX -= deltaY * 0.005;

            // Блокируем шею, чтобы не сломать (нельзя смотреть ниже ног или дальше зенита)
            rotationX = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, rotationX));

            player.rotation.y = rotationY; // Вращаем все тело
            camera.rotation.x = rotationX; // Наклоняем только камеру

            previousTouch.x = touch.clientX;
            previousTouch.y = touch.clientY;
        }, {passive: false});

        document.addEventListener('touchend', () => {
            isDragging = false;
        });

        // === 5. ИГРОВОЙ ЦИКЛ ===
        function animate() {
            requestAnimationFrame(animate);

            // Физика ходьбы (с учетом того, куда повернут игрок)
            if (moveForward !== 0 || moveRight !== 0) {
                // В Three.js ось Z направлена "на нас", поэтому вперед это минус Z
                player.translateZ(-moveForward * speed);
                player.translateX(moveRight * speed);
            }

            renderer.render(scene, camera);
        }
        animate();

        // Адаптация экрана, если перевернуть телефон
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
