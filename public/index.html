<!DOCTYPE html>
<html>
<head>
    <title>2D Minecraft Multiplayer</title>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const TILE_SIZE = 20;
        
        let world = [];
        let currentBlock = 1; // 0 - удалить, 1 - земля
        
        // Подключаемся к серверу
        const socket = io();

        // 1. Получаем начальный мир от сервера при подключении
        socket.on('initWorld', (serverWorld) => {
            world = serverWorld;
            drawWorld();
        });

        // 2. Получаем обновления отдельных блоков от других игроков (и от себя)
        socket.on('updateBlock', (data) => {
            world[data.y][data.x] = data.blockType;
            drawWorld(); // Перерисовываем мир с новым блоком
        });

        // Функция отрисовки (осталась почти такой же)
        function drawWorld() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let y = 0; y < world.length; y++) {
                for (let x = 0; x < world[y].length; x++) {
                    if (world[y][x] === 1) {
                        ctx.fillStyle = '#8B4513';
                        ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    }
                }
            }
        }

        // Обработка клика
        canvas.addEventListener('mousedown', (event) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;
            
            const gridX = Math.floor(mouseX / TILE_SIZE);
            const gridY = Math.floor(mouseY / TILE_SIZE);
            
            // ВАЖНО: Мы больше не меняем мир напрямую!
            // Мы просим сервер изменить блок.
            const newBlockType = world[gridY][gridX] === 0 ? 1 : 0;
            
            socket.emit('placeBlock', {
                x: gridX,
                y: gridY,
                blockType: newBlockType
            });
        });
    </script>
</body>
</html>
